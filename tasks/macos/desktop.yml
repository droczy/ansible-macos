---
- name: Set black wallpaper
  ansible.builtin.command:
    cmd: osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/System/Library/Desktop Pictures/Solid Colors/Black.png"'

- name: Disable desktop widgets
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: StandardHideWidgets
    type: int
    value: 1
